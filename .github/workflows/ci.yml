name: CI

on:
  push:
    branches: [main, improv]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── ML pipeline tests ──────────────────────────────────────────────────────
  ml-tests:
    name: ML · Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fbref
          POSTGRES_USER: fbref
          POSTGRES_PASSWORD: ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fbref -d fbref"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: ml/requirements.txt

      - name: Install ML dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ml/requirements.txt
          pip install pytest pytest-cov

      - name: Run ML tests
        env:
          ML_DATABASE_URL: postgresql+psycopg2://fbref:ci_password@localhost:5432/fbref
          ML_RANDOM_SEED: 42
        run: |
          pytest ml/tests/ -v --tb=short --cov=ml --cov-report=term-missing

  # ── API tests ──────────────────────────────────────────────────────────────
  api-tests:
    name: API · Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fbref
          POSTGRES_USER: fbref
          POSTGRES_PASSWORD: ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fbref -d fbref"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run API tests
        env:
          API_DATABASE_URL: postgresql+asyncpg://fbref:ci_password@localhost:5432/fbref
          API_REDIS_URL: redis://localhost:6379/0
          API_KEY_SECRET: ""
          API_ARTIFACTS_DIR: /tmp/artifacts
          API_LOG_LEVEL: WARNING
          API_DEBUG: "false"
        run: |
          pytest api/tests/ -v --tb=short --cov=api/src --cov-report=term-missing
        continue-on-error: true  # no API tests yet — remove when tests are added

  # ── Docker build smoke test ────────────────────────────────────────────────
  docker-build:
    name: Docker build · ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api, ml, scraper]

    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.service }} image
        run: docker build ./${{ matrix.service }} --tag baudo-spoon/${{ matrix.service }}:ci

  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check api/src ml scraper/src --output-format=github

      - name: Run ruff format check
        run: ruff format api/src ml scraper/src --check
